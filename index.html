<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Dental Implant Center</title>

  <!-- Preconnect for fastest font load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Non-blocking font load -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ─── Design Tokens (from Token-Hex-Use.csv) ───────────────────── */
    :root {
      /* Brand */
      --color-primary:       #0A5CFF; /* Main CTA blue, links, key actions */
      --color-secondary:     #5BB6FF; /* Gradient partner, highlights, soft emphasis */
      --color-primary-dark:  #0847C7; /* Hover/pressed state for primary blue */
      --color-primary-soft:  #EAF2FF; /* Light blue surface, chips, info cards */
      --color-accent-ice:    #F4F9FF; /* Blue-tinted background sections */

      /* Text */
      --color-text:          #1D1D1F; /* Primary text — Apple-style near-black */
      --color-text-muted:    #6E6E73; /* Secondary text, supporting copy */
      --color-text-faint:    #8E8E93; /* Captions, metadata, helper text */

      /* Surfaces */
      --color-bg:            #F5F5F7; /* Main page background — Apple-style off-white */
      --color-surface:       #FFFFFF; /* Cards, nav, content panels */
      --color-surface-alt:   #FBFBFD; /* Alternate section background */

      /* Strokes */
      --color-border:        #DDE3EA; /* Borders, dividers, inputs */
      --color-divider:       #E5E5EA; /* Soft separators */

      /* Semantic */
      --color-success:       #22A06B;
      --color-warning:       #C98A16;
      --color-error:         #D92D20;

      /* Aliases used throughout */
      --color-accent:        var(--color-primary);
      --color-accent-light:  var(--color-primary-soft);
      --color-star:          #F5A623; /* star gold — not in CSV, kept as-is */

      --max-width:         1400px;
      --nav-height:        68px;

      --font-display:      'Inter', system-ui, sans-serif;
      --font-body:         'Inter', system-ui, sans-serif;

      --ease-out-expo:     cubic-bezier(.19,1,.22,1);

      --space-2xs:  .25rem;
      --space-xs:   .5rem;
      --space-sm:   .75rem;
      --space-md:   1rem;
      --space-lg:   1.5rem;
      --space-xl:   2.5rem;
      --space-2xl:  4rem;
      --space-3xl:  6rem;
    }

    /* ─── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    /* ─── Typography Scale ───────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--font-body);
      font-size: .75rem;             /* 12px */
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    .display {
      font-family: var(--font-display);
      font-size: clamp(2.25rem, 5vw, 3.5rem); /* 36px → 56px */
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.5vw, 2.75rem); /* 32px → 44px */
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .h2 {
      font-family: var(--font-display);
      font-size: clamp(1.625rem, 2.5vw, 2rem); /* 26px → 32px */
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -.015em;
    }

    .h3 {
      font-family: var(--font-display);
      font-size: clamp(1.375rem, 1.8vw, 1.5rem); /* 22px → 24px */
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -.01em;
    }

    .h4 {
      font-family: var(--font-body);
      font-size: 1.25rem; /* 20px */
      font-weight: 600;
      line-height: 1.4;
    }

    .subhead {
      font-family: var(--font-body);
      font-size: clamp(1.125rem, 1.5vw, 1.375rem); /* 18px → 22px */
      font-weight: 400;
      line-height: 1.5;
      color: var(--color-text-muted);
    }

    .body {
      font-family: var(--font-body);
      font-size: clamp(1rem, 1.2vw, 1.125rem); /* 16px → 18px */
      font-weight: 400;
      line-height: 1.6;
    }

    .body-large {
      font-family: var(--font-body);
      font-size: clamp(1.125rem, 1.3vw, 1.25rem); /* 18px → 20px */
      font-weight: 400;
      line-height: 1.6;
    }

    .body-small {
      font-family: var(--font-body);
      font-size: clamp(.9375rem, 1.1vw, 1rem); /* 15px → 16px */
      font-weight: 400;
      line-height: 1.5;
    }

    .caption {
      font-family: var(--font-body);
      font-size: clamp(.8125rem, .9vw, .875rem); /* 13px → 14px */
      font-weight: 400;
      line-height: 1.4;
      color: var(--color-text-muted);
    }

    .button-text {
      font-family: var(--font-body);
      font-size: 1rem; /* 16px */
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: .01em;
    }

    .label {
      font-family: var(--font-body);
      font-size: .875rem; /* 14px */
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ─── Layout Helpers ─────────────────────────────────────────────── */
    .wrapper {
      width: 100%;
      max-width: var(--max-width);
      margin-inline: auto;
      padding-inline: clamp(1.25rem, 5vw, 3rem);
    }

    /* ─── NAV ────────────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-height);
      background: rgba(17,19,23,.92);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,.08);
      transition: transform .4s var(--ease-out-expo),
                  opacity  .4s var(--ease-out-expo);
    }

    .nav.nav--hidden {
      transform: translateY(-100%);
      opacity: 0;
    }

    .nav__inner {
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Wordmark */
    .nav__logo {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .nav__logo-img {
      height: 36px;
      width: auto;
      display: block;
    }

    /* Desktop links */
    .nav__links {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
      list-style: none;
    }

    .nav__links a {
      font-size: .875rem;
      font-weight: 400;
      color: rgba(255,255,255,.6);
      transition: color .2s;
    }

    .nav__links a:hover { color: #fff; }

    /* Nav CTA */
    .nav__cta {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: .5rem 1.25rem;
      border-radius: 100px;
      background: #fff;
      color: #111317;
      font-size: .8125rem;
      font-weight: 600;
      letter-spacing: .01em;
      transition: background .2s, color .2s, transform .15s;
    }

    .nav__cta:hover {
      background: var(--color-primary);
      color: #fff;
      transform: translateY(-1px);
    }

    /* Hamburger */
    .nav__burger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .nav__burger-line {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #fff;
      border-radius: 2px;
      transform-origin: center;
      transition: transform .35s var(--ease-out-expo),
                  opacity  .25s ease,
                  width    .3s  var(--ease-out-expo);
    }

    /* Animated X state */
    .nav__burger[aria-expanded="true"] .nav__burger-line:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
    }
    .nav__burger[aria-expanded="true"] .nav__burger-line:nth-child(2) {
      opacity: 0;
      width: 0;
    }
    .nav__burger[aria-expanded="true"] .nav__burger-line:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
    }

    /* Mobile drawer */
    .nav__drawer {
      display: none;
      position: fixed;
      inset: var(--nav-height) 0 0 0;
      background: rgba(17,19,23,.97);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
      padding: var(--space-xl) clamp(1.25rem, 5vw, 3rem);
      flex-direction: column;
      gap: var(--space-lg);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity .3s var(--ease-out-expo),
                  transform .35s var(--ease-out-expo);
      z-index: 99;
      list-style: none;
    }

    .nav__drawer.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .nav__drawer a {
      font-family: var(--font-body);
      font-size: 1.5rem;
      color: rgba(255,255,255,.8);
      transition: color .2s;
    }

    .nav__drawer a:hover { color: #fff; }

    /* ─── HERO ───────────────────────────────────────────────────────── */
    .hero {
      padding-top: calc(var(--nav-height) + var(--space-3xl));
      padding-bottom: var(--space-3xl);
      min-height: 100svh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial accent behind hero text */
    .hero::before {
      content: '';
      position: absolute;
      top: -10%;
      right: -5%;
      width: 55%;
      height: 70%;
      background: radial-gradient(ellipse at 70% 30%,
        rgba(10,92,255,.09) 0%,
        transparent 65%);
      pointer-events: none;
    }

    .hero__inner {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-2xl);
      position: relative;
      justify-items: center;
      text-align: center;
    }

    .hero__content {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
      max-width: 780px;
      align-items: center;
    }

    /* Stagger fade-in */
    .hero__eyebrow,
    .hero__headline,
    .hero__subhead,
    .hero__actions,
    .hero__reviews {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp .8s var(--ease-out-expo) forwards;
    }

    .hero__eyebrow  { animation-delay: .05s; }
    .hero__headline { animation-delay: .15s; }
    .hero__subhead  { animation-delay: .25s; }
    .hero__actions  { animation-delay: .35s; }
    .hero__reviews  { animation-delay: .45s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Eyebrow pill */
    .hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      align-self: flex-start;
      padding: .375rem .875rem;
      border-radius: 100px;
      background: var(--color-primary-soft);
      border: 1px solid rgba(10,92,255,.18);
    }

    .hero__eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-primary);
      flex-shrink: 0;
    }

    .hero-title {
      font-family: var(--font-body);
      font-weight: 800;
      font-size: clamp(3.5rem, 7vw, 6.25rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      max-width: 12ch;
      color: var(--color-text);
    }

    /* Headline — italic accent on last word */
    .hero__headline em {
      font-style: italic;
      color: var(--color-primary);
    }

    /* CTA group */
    .hero__actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: .875rem 2rem;
      border-radius: 100px;
      background: var(--color-primary);
      color: #fff;
      transition: background .25s, transform .2s, box-shadow .25s;
      box-shadow: 0 4px 24px rgba(10,92,255,.28);
    }

    .btn-primary:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(10,92,255,.36);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-gradient {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: .875rem 2rem;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: #fff;
      transition: opacity .25s, transform .2s, box-shadow .25s;
      box-shadow: 0 4px 24px rgba(10,92,255,.28);
    }

    .btn-gradient:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(10,92,255,.36);
    }

    .btn-gradient:active {
      transform: translateY(0);
    }

    /* Arrow icon inside button */
    .btn-primary__arrow {
      width: 16px;
      height: 16px;
      transition: transform .25s var(--ease-out-expo);
    }

    .btn-primary:hover .btn-primary__arrow {
      transform: translateX(3px);
    }

    /* Trust note */
    .hero__trust {
      font-size: .8125rem;
      color: var(--color-text-muted);
      font-weight: 400;
    }

    /* Reviews row */
    .hero__reviews {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding-top: var(--space-xs);
    }

    .hero__review-divider {
      width: 1px;
      height: 36px;
      background: var(--color-border);
    }

    .hero__stars {
      display: flex;
      gap: 3px;
    }

    .hero__star {
      width: 18px;
      height: 18px;
      fill: var(--color-star);
    }

    .hero__review-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .hero__review-label {
      font-size: .8125rem;
      font-weight: 500;
      color: var(--color-text);
    }

    .hero__review-sub {
      font-size: .75rem;
      color: var(--color-text-muted);
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */

    /* Show desktop nav links, hide burger below 768 */
    @media (max-width: 767px) {
      .nav__links,
      .nav__cta { display: none; }
      .nav__burger { display: flex; }
      .nav__drawer { display: flex; }
    }

    @media (min-width: 768px) {
      .nav__drawer { display: none !important; }
    }


    /* Body scroll lock when menu open */
    body.menu-open { overflow: hidden; }
  </style>
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────────────────── -->
  <header class="nav" id="nav" role="banner">
    <div class="wrapper">
      <nav class="nav__inner" aria-label="Main navigation">

        <!-- Wordmark -->
        <a class="nav__logo" href="/" aria-label="ARC Dental Implant Center home">
          <img
            src="https://pub-9a939dd84d0a498882a8923655eac008.r2.dev/branding/arc-dental-logo-white-160px.avif"
            alt="ARC Dental Implant Center"
            class="nav__logo-img"
            width="160"
            height="40"
          />
        </a>

        <!-- Desktop links -->
        <ul class="nav__links" role="list">
          <li><a href="#how-it-works" class="body-small">How it Works</a></li>
          <li><a href="#stories" class="body-small">Stories</a></li>
          <li><a href="#faq" class="body-small">FAQ</a></li>
        </ul>

        <!-- Desktop CTA -->
        <a href="#get-started" class="nav__cta button-text">Get Started</a>

        <!-- Mobile burger -->
        <button
          class="nav__burger"
          id="burger"
          aria-controls="mobile-menu"
          aria-expanded="false"
          aria-label="Open navigation menu"
        >
          <span class="nav__burger-line" aria-hidden="true"></span>
          <span class="nav__burger-line" aria-hidden="true"></span>
          <span class="nav__burger-line" aria-hidden="true"></span>
        </button>

      </nav>
    </div>
  </header>

  <!-- Mobile drawer -->
  <ul class="nav__drawer" id="mobile-menu" role="list" aria-label="Mobile navigation">
    <li><a href="#how-it-works" class="h3">How it Works</a></li>
    <li><a href="#stories" class="h3">Stories</a></li>
    <li><a href="#faq" class="h3">FAQ</a></li>
    <li><a href="#get-started" class="h3" style="color:var(--color-primary)">Get Started →</a></li>
  </ul>

  <!-- ─── MAIN ──────────────────────────────────────────────────────────── -->
  <main>

    <!-- ─── HERO ────────────────────────────────────────────────────────── -->
    <section class="hero" aria-labelledby="hero-headline">
      <div class="wrapper">
        <div class="hero__inner">

          <!-- Content column -->
          <div class="hero__content">

            <!-- Headline -->
            <h1 class="hero__headline hero-title" id="hero-headline">
              Stop Hiding<br>Your Smile.<br>Start Living <em>Again.</em>
            </h1>

            <!-- Subhead -->
            <p class="hero__subhead subhead">
              Learn about the system that gave over&nbsp;400 everyday people their confidence back.
            </p>

            <!-- CTA -->
            <div class="hero__actions">
              <a href="#get-started" class="btn-primary" id="hero-cta">
                <span class="button-text">I'm Ready to Smile Again</span>
                <svg class="btn-primary__arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>
            </div>

            <!-- Reviews -->
            <div class="hero__reviews" aria-label="Customer reviews">
              <!-- Stars -->
              <div class="hero__stars" aria-label="5 stars">
                <svg class="hero__star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1l2.39 4.84 5.34.77-3.87 3.77.91 5.32L9 13.27l-4.77 2.53.91-5.32L1.27 6.61l5.34-.77L9 1z"/></svg>
                <svg class="hero__star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1l2.39 4.84 5.34.77-3.87 3.77.91 5.32L9 13.27l-4.77 2.53.91-5.32L1.27 6.61l5.34-.77L9 1z"/></svg>
                <svg class="hero__star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1l2.39 4.84 5.34.77-3.87 3.77.91 5.32L9 13.27l-4.77 2.53.91-5.32L1.27 6.61l5.34-.77L9 1z"/></svg>
                <svg class="hero__star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1l2.39 4.84 5.34.77-3.87 3.77.91 5.32L9 13.27l-4.77 2.53.91-5.32L1.27 6.61l5.34-.77L9 1z"/></svg>
                <svg class="hero__star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 1l2.39 4.84 5.34.77-3.87 3.77.91 5.32L9 13.27l-4.77 2.53.91-5.32L1.27 6.61l5.34-.77L9 1z"/></svg>
              </div>

              <div class="hero__review-text">
                <span class="hero__review-label">5 stars out of 117 reviews</span>
              </div>
            </div>

          </div><!-- /hero__content -->

        </div><!-- /hero__inner -->
      </div><!-- /wrapper -->
    </section>

  </main>

  <script>
    (() => {
      'use strict';

      /* ─── Hide-on-scroll nav ─────────────────────────────────────── */
      const nav    = document.getElementById('nav');
      let lastY    = window.scrollY;
      let ticking  = false;

      const updateNav = () => {
        const currentY = window.scrollY;
        const scrolled = currentY > 80;          // only hide after 80px
        const goingDown = currentY > lastY;

        if (scrolled && goingDown) {
          nav.classList.add('nav--hidden');
        } else {
          nav.classList.remove('nav--hidden');
        }

        lastY = currentY;
        ticking = false;
      };

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateNav);
          ticking = true;
        }
      }, { passive: true });

      /* ─── Mobile burger ──────────────────────────────────────────── */
      const burger = document.getElementById('burger');
      const drawer = document.getElementById('mobile-menu');

      const openMenu  = () => {
        burger.setAttribute('aria-expanded', 'true');
        burger.setAttribute('aria-label', 'Close navigation menu');
        drawer.classList.add('is-open');
        document.body.classList.add('menu-open');
      };

      const closeMenu = () => {
        burger.setAttribute('aria-expanded', 'false');
        burger.setAttribute('aria-label', 'Open navigation menu');
        drawer.classList.remove('is-open');
        document.body.classList.remove('menu-open');
      };

      burger.addEventListener('click', () => {
        const isOpen = burger.getAttribute('aria-expanded') === 'true';
        isOpen ? closeMenu() : openMenu();
      });

      // Close on drawer link tap
      drawer.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeMenu);
      });

      // Close on Escape
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeMenu();
      });

    })();
  </script>

</body>
</html>
